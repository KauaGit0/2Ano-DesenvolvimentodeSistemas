<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tier List - Full Version</title>
    <style>
        /* --- CSS (ESTILO) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { 
            color: #ff4655; 
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p { color: #888; }

        /* Container da Tier List */
        .tier-container {
            width: 100%;
            max-width: 900px;
            background-color: #1a1a1a;
            border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tier-row {
            display: flex;
            min-height: 110px;
            border-bottom: 1px solid #333;
        }

        .tier-row:last-child { border-bottom: none; }

        /* Rótulos Laterais */
        .label {
            width: 110px;
            min-width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: rgba(0,0,0,0.7);
        }

        .s-tier { background-color: #ff7f7f; }
        .a-tier { background-color: #ffbf7f; }
        .b-tier { background-color: #ffff7f; }
        .c-tier { background-color: #7fff7f; }
        .d-tier { background-color: #7fbfff; }

        /* Zonas de Drop */
        .drop-zone {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 10px;
            gap: 10px;
            transition: background 0.2s;
        }

        .drop-zone.drag-over {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Imagens dos Animes */
        .anime-card {
            width: 85px;
            height: 110px;
            background-size: cover;
            background-position: center;
            cursor: grab;
            border-radius: 4px;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .anime-card:active { cursor: grabbing; }
        .anime-card:hover {
            transform: scale(1.08);
            border-color: white;
            z-index: 5;
        }

        /* Banco de Animes Inferior */
        .bank-section {
            margin-top: 40px;
            width: 100%;
            max-width: 900px;
        }

        .bank-section h2 { 
            margin-bottom: 15px; 
            color: #555; 
            font-size: 1.2rem;
            text-align: center;
        }

        #bank {
            background-color: #0a0a0a;
            border: 2px dashed #333;
            min-height: 150px;
            justify-content: center;
            border-radius: 8px;
            padding: 20px;
        }

        /* Responsividade básica */
        @media (max-width: 600px) {
            .label { width: 70px; min-width: 70px; font-size: 1.5rem; }
            .anime-card { width: 60px; height: 80px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Anime Tier List</h1>
        <p>Arraste e solte os animes para criar o seu ranking!</p>
    </header>

    <main class="tier-container">
        <div class="tier-row">
            <div class="label s-tier">S</div>
            <div class="drop-zone"></div>
        </div>

        <div class="tier-row">
            <div class="label a-tier">A</div>
            <div class="drop-zone"></div>
        </div>

        <div class="tier-row">
            <div class="label b-tier">B</div>
            <div class="drop-zone"></div>
        </div>

        <div class="tier-row">
            <div class="label c-tier">C</div>
            <div class="drop-zone"></div>
        </div>
    </main>

    <section class="bank-section">
        <h2>Banco de Personagens / Obras</h2>
        <div class="drop-zone" id="bank">
            <div class="anime-card" draggable="true" title="Naruto" style="background-image: url('https://images.unsplash.com/photo-1578632292335-df3abbb0d586?w=200');"></div>
            <div class="anime-card" draggable="true" title="One Piece" style="background-image: url('https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=200');"></div>
            <div class="anime-card" draggable="true" title="Dragon Ball" style="background-image: url('https://images.unsplash.com/photo-1541562232579-512a21360020?w=200');"></div>
            <div class="anime-card" draggable="true" title="Attack on Titan" style="background-image: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=200');"></div>
            <div class="anime-card" draggable="true" title="Demon Slayer" style="background-image: url('https://images.unsplash.com/photo-1612178537253-bccd437b730e?w=200');"></div>
            <div class="anime-card" draggable="true" title="Jujutsu Kaisen" style="background-image: url('https://images.unsplash.com/photo-1635048424329-a9bfb146d7aa?w=200');"></div>
            <div class="anime-card" draggable="true" title="Hunter x Hunter" style="background-image: url('https://images.unsplash.com/photo-1528446139434-cec96377372d?w=200');"></div>
            <div class="anime-card" draggable="true" title="Death Note" style="background-image: url('https://images.unsplash.com/photo-1627337142373-3c9780004944?w=200');"></div>
            <div class="anime-card" draggable="true" title="Bleach" style="background-image: url('https://images.unsplash.com/photo-1560972550-aba3456b5564?w=200');"></div>
            <div class="anime-card" draggable="true" title="Fullmetal Alchemist" style="background-image: url('https://images.unsplash.com/photo-1614583225154-5feaba071595?w=200');"></div>
        </div>
    </section>

    <script>
        /* --- JAVASCRIPT (LÓGICA) --- */
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.anime-card');
            const zones = document.querySelectorAll('.drop-zone');

            cards.forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    card.classList.add('dragging');
                    // Define um ID único temporário para o elemento arrastado
                    card.id = "temp-drag-id";
                });

                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    card.removeAttribute('id');
                });
            });

            zones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault(); // Necessário para permitir o drop
                    zone.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    const draggedItem = document.getElementById('temp-drag-id');
                    
                    // Se o usuário soltar em cima de outra imagem, pegamos a zona correta
                    let targetZone = e.target;
                    if (!targetZone.classList.contains('drop-zone')) {
                        targetZone = targetZone.closest('.drop-zone');
                    }

                    if (targetZone && draggedItem) {
                        targetZone.appendChild(draggedItem);
                    }
                });
            });
        });
    </script>
</body>
</html>
