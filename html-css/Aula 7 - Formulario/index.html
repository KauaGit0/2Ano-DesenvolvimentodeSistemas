<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 7</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

    <form action="#">
        <h1>Formulário Cabuloso</h1>
        <!-- Input Nome -->
         
         <div class="formAssunto">
            <label for="nome">Nome: </label>
            <input id="nome" type="text" placeholder="Exemplo: Guilherme">

        </div>
        <!-- Input Idade -->
        <div class="formAssunto">
            <label for="idade">Idade: </label>
            <input id="idade" type="number" min="0" max="200" step="1" placeholder="20, 22...">

        </div>
    </form>
</body>
</html>
